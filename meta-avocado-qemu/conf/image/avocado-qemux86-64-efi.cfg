{
  "image": "efi.img",
  "partition-table-type": "none",
  "partitions": [
    {
      "name": "esp",
      "image": "",
      "size": 64,
      "filesystem": "vfat",
      "mountpoint": "/",
      "content": [
        { "source": "systemd-bootx64.efi", "target": "/EFI/BOOT/BOOTX64.EFI" },
        { "source": "avocado.conf", "target": "/loader/entries/avocado.conf" },
        { "source": "loader.conf", "target": "/loader/loader.conf" },
        { "source": "Image", "target": "/vmlinuz" },
        { "source": "avocado-initramfs-${AVOCADO_SDK_TARGET}.cpio.zst", "target": "/initrd.cpio.zst" }
      ]
    }
  ]
}
