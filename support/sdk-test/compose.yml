services:
  package-repo:
    build:
      context: ../package-repo
      dockerfile: Containerfile
    ports:
      - "8080:80"
    volumes:
      - ${DEPLOY_DIR}/rpm:/repo:ro,z
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s  # Check every 10 seconds
      timeout: 5s    # Wait up to 5 seconds for the check to complete
      retries: 10     # Try 5 times before marking as unhealthy
      start_period: 15s # Grace period for startup before first check failure counts

  sdk:
    image: avocadolinux/sdk:dev
    environment:
      - AVOCADO_SDK_TARGET=qemux86-64
    depends_on:
      package-repo:
        condition: service_healthy
    entrypoint: /entrypoint.sh
    volumes:
      - ./:/opt:z
      - ./run_qemu.sh:/run_qemu.sh:ro,z
      - ./build_var.sh:/build_var.sh:ro,z
      - ./entrypoint.sh:/entrypoint.sh:ro,z
